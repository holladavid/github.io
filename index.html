<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptunes Fantasy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">
    <!-- Retro Fonts laden -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body class="theme-c64"> 

    <div id="boot-screen">
        <h1 class="blink">[ INSERT DISK AND CLICK TO START ]</h1>
    </div>

    <!-- HIER FEHLTE DIESE ZEILE: -->
    <div id="demo-container" class="hidden">

        <!-- ZONE 1: Das Spektakel (40% Höhe) -->
        <div id="visual-zone">
            <canvas id="demo-canvas"></canvas>
            
            <!-- NEU: Das nerdige Hardware-HUD (Jetzt einklappbar!) -->
            <div id="chip-hud">
                <div class="hud-header">
                    <span id="hud-title">DSP REGISTERS</span>
                    <div>
                        <button id="btn-hud-info" class="hidden" title="Toggle Cheat Sheet">[?]</button>
                        <button id="btn-hud-toggle" title="Toggle HUD">[+]</button>
                    </div>
                </div>
                
                <!-- Der Body-Wrapper (Standardmäßig hochgeklappt) -->
                <div id="hud-body" class="hidden">
                    <div id="hud-matrix"></div>
                    <div id="hud-legend" class="hidden"></div>
                </div>
            </div>

            <div class="scanlines"></div> <!-- CRT Monitor Effekt -->
        </div>
        <div id="ui-zone">
            <div id="player-panel">
                
                <!-- NEU: Saubere data-theme Attribute statt onclick! -->
                <div class="system-tabs">
                    <button class="tab-btn active" data-theme="theme-c64">C64</button>
                    <button class="tab-btn" data-theme="theme-amiga">AMIGA</button>
                    <button class="tab-btn" data-theme="theme-atari">ATARI ST</button>
                </div>
                
                <!-- NEU: Emu Core Selector -->
                <div class="core-control">
                    <label>CORE:</label>
                    <select id="core-selector"></select>
                </div>

                <ul id="tracklist"></ul>
                
                <div class="controls">
                    <button id="btn-prev">⏮</button>
                    <button id="btn-play">▶ / ⏸</button>
                    <button id="btn-next">⏭</button>
                </div>
                
                <!-- NEU: Die Timeline (Dauer des Tracks) -->
                <div class="timeline-control">
                    <span id="time-current">00:00</span>
                    <input type="range" id="progress-slider" min="0" max="100" value="0" disabled>
                    <span id="time-total">00:00</span>
                </div>

                <div class="volume-control">
                    <label>VOL</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>

            <div id="museum-panel">
                <div class="museum-header">
                    <h2>>>> INFO: MOS Technology SID 6581</h2>
                </div>
                <div class="museum-content" id="info-text">
                    <p class="blinking-cursor">_</p>
                </div>
            </div>

        </div>

        <div id="scroller-zone">
            <canvas id="scroller-canvas"></canvas>
        </div>

    </div>

    <!-- WICHTIG: Das Skript MUSS ans Ende des Bodys! -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
