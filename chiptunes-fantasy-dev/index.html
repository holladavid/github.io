<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiptunes Fantasy</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Inline-Daten-Icon, das dem Browser sagt: "Suche nicht nach einer favicon.ico!" -->
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🎵</text></svg>">
    
    <!-- PWA & iOS Standalone Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chiptunes">
    
    <!-- Hochauflösendes, inline-codiertes Vektor-Homescreen-Icon für Apple-Geräte -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23352879'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23ffffff' font-family='monospace' font-size='80' font-weight='bold'>[⛶]</text></svg>">

    <!-- Retro Fonts laden -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body class="theme-c64"> 

    <div id="boot-screen">
        <h1 class="blink">[ INSERT DISK AND CLICK TO START ]</h1>
    </div>

    <div id="demo-container" class="hidden">

        <!-- ZONE 1: Das Spektakel (40% Höhe) -->
        <div id="visual-zone">

            <canvas id="demo-canvas"></canvas>
                        
            <!-- Das animierte Chiptunes Fantasy Logo -->
            <div id="brand-logo">
                <div class="brand-main">CHIPTUNES</div>
                <div class="brand-sub">FANTASY</div>
            </div>

            <!-- Das nerdige Hardware-HUD -->
            <div id="chip-hud" class="collapsed">
                <div class="hud-header">
                    <span id="hud-title">DSP REGISTERS</span>
                    <div>
                        <button id="btn-hud-info" class="hidden" title="Toggle Cheat Sheet">[?]</button>
                        <button id="btn-hud-toggle" title="Toggle HUD">[+]</button>
                    </div>
                </div>
                
                <div id="hud-body" class="hidden">
                    <div id="hud-matrix"></div>
                    <div id="hud-legend" class="hidden"></div>
                </div>
            </div>

            <!-- PURE AUDIO OVERLAY -->
            <div id="eco-overlay" class="hidden">
                <div class="eco-box">
                    <h2 class="blink">[ PURE AUDIO MODE ]</h2>
                    <p>Visual processing suspended to conserve power.</p>
                    <p>DSP Cores running at maximum priority.</p>
                    <!-- BUGFIX: Tag am Ende korrekt auf </p> geändert -->
                    <p style="color: var(--text-color); margin-top: 15px; font-weight: bold;">>>> SCREEN SLEEP DISABLED <<<</p>
                    <button id="btn-eco-off">WAKE UP</button>
                </div>
            </div>
            <!-- NEU: Der Fullscreen-Button Overlay -->
            <button id="btn-fullscreen" title="Toggle Fullscreen">[ ⛶ ]</button>
            
            <div class="scanlines"></div> <!-- CRT Monitor Effekt -->
        </div>
        
        <!-- DIE STICKY PLAYBACK BAR -->
        <div id="playback-bar">
        <div class="controls">
                <!-- Klassische Tracker ASCII-Buttons -->
                <button id="btn-prev">|&lt;</button>
                <button id="btn-play">&gt; / ||</button>
                <button id="btn-next">&gt;|</button>
                <button id="btn-eco" title="Pure Audio Mode">ECO</button>
            </div>
            
            <div class="timeline-control">
                <!-- NEU: Das retro-designte Subsong-Display -->
                <span id="subsong-display" class="hidden"></span>
                <span id="time-current">00:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0" disabled>
                <span id="time-total">00:00</span>
            </div>

            <div class="volume-control">
                <label>VOL</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <!-- ZONE 2 & 3: Player und Museum -->
        <div id="ui-zone">
            
            <!-- Linke Spalte: Player & Tracklist -->
            <div id="player-panel">
                <div class="system-tabs">
                    <button class="tab-btn active" data-theme="theme-c64">C64</button>
                    <button class="tab-btn" data-theme="theme-amiga">AMIGA</button>
                    <button class="tab-btn" data-theme="theme-atari">ATARI ST</button>
                </div>
                
                <div class="core-control">
                    <label>CORE:</label>
                    <select id="core-selector"></select>
                </div>
                
                <ul id="tracklist"></ul>
            </div> <!-- Ende player-panel -->

            <!-- Rechte Spalte: Museum / Info -->
            <div id="museum-panel">
                <div class="museum-header">
                    <h2>>>> INFO: MOS Technology SID 6581</h2>
                </div>
                <div class="museum-content" id="info-text">
                    <p class="blinking-cursor">_</p>
                </div>
            </div> <!-- Ende museum-panel -->

        </div> <!-- Ende ui-zone -->

        <!-- ZONE 4: Scroller -->
        <div id="scroller-zone">
            <canvas id="scroller-canvas"></canvas>
        </div>

    </div> <!-- Ende demo-container -->

    <!-- WICHTIG: Das Skript MUSS ans Ende des Bodys! -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
